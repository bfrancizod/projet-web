# =============================================================
#  Virtual Host Apache — Help Me Stage
# =============================================================
#
#  Ce fichier configure un hôte virtuel Apache pour servir le site.
#  La racine web pointe sur le dossier public/ (et NON la racine du projet),
#  pour que les fichiers sensibles (src/, vendor/, .env) ne soient jamais
#  accessibles directement par HTTP.
#
#  -------------------------------------------------------------
#  INSTALLATION (Ubuntu / Debian / WSL)
#  -------------------------------------------------------------
#  1. Copier ce fichier dans les sites disponibles d'Apache :
#       sudo cp apache/helpmestage.conf /etc/apache2/sites-available/helpmestage.conf
#
#  2. Adapter le chemin DocumentRoot ci-dessous au chemin réel du projet
#     sur la machine (remplacer /chemin/vers/projet-web-1).
#
#  3. Activer le module de réécriture d'URL (pour le routeur) et le site :
#       sudo a2enmod rewrite
#       sudo a2ensite helpmestage.conf
#
#  4. (Optionnel) Ajouter la ligne suivante dans /etc/hosts :
#       127.0.0.1   helpmestage.local
#
#  5. Recharger Apache :
#       sudo systemctl reload apache2
#
#  6. Ouvrir http://helpmestage.local dans le navigateur.
# =============================================================

<VirtualHost *:80>
    # Nom de domaine local du site
    ServerName helpmestage.local

    # Racine web : on expose UNIQUEMENT le dossier public/
    DocumentRoot /chemin/vers/projet-web-1/public

    <Directory /chemin/vers/projet-web-1/public>
        # Autorise la lecture des règles du .htaccess (réécriture d'URL, sécurité)
        AllowOverride All

        # Autorise l'accès au dossier public
        Require all granted

        # Empêche l'affichage de la liste des fichiers d'un dossier
        Options -Indexes +FollowSymLinks
    </Directory>

    # Fichiers de logs dédiés au site (facilite le diagnostic)
    ErrorLog ${APACHE_LOG_DIR}/helpmestage_error.log
    CustomLog ${APACHE_LOG_DIR}/helpmestage_access.log combined
</VirtualHost>
