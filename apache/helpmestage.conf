
<VirtualHost *:80>
    ServerName helpmestage.local
    Redirect permanent / https://helpmestage.local/
</VirtualHost>

<VirtualHost *:443>
    ServerName helpmestage.local

    DocumentRoot /home/bfrancizod/projet-web-fresh/public

    SSLEngine on
    SSLCertificateFile /home/bfrancizod/projet-web-fresh/apache/helpmestage.local.pem
    SSLCertificateKeyFile /home/bfrancizod/projet-web-fresh/apache/helpmestage.local-key.pem

    <Directory /home/bfrancizod/projet-web-fresh/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    ErrorLog /var/log/httpd/helpmestage_error.log
    CustomLog /var/log/httpd/helpmestage_access.log combined
</VirtualHost>
